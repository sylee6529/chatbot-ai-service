spring.datasource.url=jdbc:h2:mem:aichatbot;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=test-only-change-this-secret-test-only-change-this-secret
jwt.access-token-ttl-seconds=3600

ai.api-key=
ai.base-url=http://localhost
ai.default-model=fake-test-model
ai.connect-timeout-seconds=5
ai.read-timeout-seconds=30
