spring.application.name=AIChatbot

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:15432/aichatbot}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET:dev-only-change-this-secret-dev-only-change-this-secret}
jwt.access-token-ttl-seconds=${JWT_ACCESS_TOKEN_TTL_SECONDS:3600}

ai.api-key=${AI_API_KEY:}
ai.base-url=${AI_BASE_URL:https://api.openai.com/v1}
ai.default-model=${AI_DEFAULT_MODEL:gpt-4o-mini}
ai.embedding-model=${AI_EMBEDDING_MODEL:text-embedding-3-small}
ai.connect-timeout-seconds=${AI_CONNECT_TIMEOUT_SECONDS:5}
ai.read-timeout-seconds=${AI_READ_TIMEOUT_SECONDS:30}

chat.thread.window-minutes=${CHAT_THREAD_WINDOW_MINUTES:30}

springdoc.swagger-ui.path=/swagger-ui.html
